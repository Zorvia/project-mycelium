services:
  mycelium:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MYCELIUM_ENV=production
      - MYCELIUM_DB_URL=sqlite:///data/mycelium.db
    volumes:
      - mycelium-data:/app/data
    restart: unless-stopped

volumes:
  mycelium-data:
