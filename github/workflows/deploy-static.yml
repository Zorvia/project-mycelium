# ─────────────────────────────────────────────────────────────
# Deploy Static Demo
#
# Publishes the single-file mycelium_demo.html to:
#   • GitHub Pages  — always (no secrets needed)
#   • Netlify       — when NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
#                     are configured under repo Settings → Secrets
#   • Vercel        — when VERCEL_TOKEN + VERCEL_ORG_ID +
#                     VERCEL_PROJECT_ID are configured
#
# Trigger: push to main, or manually via "Run workflow" button.
# ─────────────────────────────────────────────────────────────

name: Deploy Static Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target(s)'
        required: false
        default: 'pages'
        type: choice
        options:
          - pages
          - netlify
          - vercel
          - all

# Only one deploy at a time per branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

# ──────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────

jobs:

  # ──────────────── Generate Demo ──────────────────
  generate:
    name: Generate Demo HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate demo
        run: python scripts/export_demo.py

      - name: Verify output
        run: |
          test -f demo/mycelium_demo.html
          echo "✅ demo/mycelium_demo.html generated ($(wc -c < demo/mycelium_demo.html) bytes)"

      # Create a minimal index.html that redirects to the demo if
      # someone visits the root of the Pages site.
      - name: Create Pages index redirect
        run: |
          cat > demo/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=mycelium_demo.html" />
            <title>Project Mycelium Demo</title>
          </head>
          <body>
            <p>Redirecting to <a href="mycelium_demo.html">Project Mycelium Demo</a>…</p>
          </body>
          </html>
          HTML

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-site
          path: demo/
          retention-days: 30

  # ──────────────── GitHub Pages ──────────────────
  deploy-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: [generate]
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'pages' ||
      github.event.inputs.target == 'all'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download demo artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-site
          path: demo/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ──────────────── Netlify ──────────────────
  deploy-netlify:
    name: Deploy → Netlify
    runs-on: ubuntu-latest
    needs: [generate]
    if: |
      (github.event.inputs.target == 'netlify' || github.event.inputs.target == 'all') &&
      vars.NETLIFY_SITE_ID != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download demo artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-site
          path: demo/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy \
            --dir=demo \
            --site=${{ vars.NETLIFY_SITE_ID }} \
            --prod \
            --message "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  # ──────────────── Vercel ──────────────────
  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [generate]
    if: |
      (github.event.inputs.target == 'vercel' || github.event.inputs.target == 'all') &&
      vars.VERCEL_PROJECT_ID != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download demo artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-site
          path: demo/

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy demo/ \
            --prod \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
